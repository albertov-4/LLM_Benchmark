registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - enabled
    - weights_path
    - model_loader
    - device_map
    - torch_dtype
    - trust_remote_code
    - use_chat_template
    - add_generation_prompt
    - temperature
