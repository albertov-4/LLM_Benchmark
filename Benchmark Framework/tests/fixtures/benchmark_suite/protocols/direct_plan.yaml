protocol_id: direct_plan
description: >
  Protocollo minimale per smoke test.

prompting:
  use_system_prompt: true
  include_domain_prompt: false
  include_examples: false
  include_chain_of_thought: false
  include_external_feedback: false

generation:
  mode: deterministic
  temperature: 0.0
  top_k: null
  max_tokens: 256

evaluation:
  max_iterations: 1
  require_final_plan_only: true
