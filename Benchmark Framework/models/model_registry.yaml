models:
  - model_id: tinyllama_1_1b_chat
    family: llama
    adapter: hf_local
    provider: huggingface_local
    enabled: true
    weights_path: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    device_map: auto
    torch_dtype: auto
    trust_remote_code: false
    use_chat_template: true
    add_generation_prompt: true
    reasoning_notes: Lightweight starter baseline for local bring-up and parser-format tests.

  - model_id: phi3_mini_4k_instruct
    family: phi
    adapter: hf_local
    provider: huggingface_local
    enabled: false
    weights_path: microsoft/Phi-3-mini-4k-instruct
    device_map: auto
    torch_dtype: auto
    trust_remote_code: true
    use_chat_template: true
    add_generation_prompt: true
    reasoning_notes: Small instruction model suited for repair-loop experiments on one GPU.

  - model_id: qwen2_5_1_5b_instruct
    family: qwen
    adapter: hf_local
    provider: huggingface_local
    enabled: false
    weights_path: Qwen/Qwen2.5-1.5B-Instruct
    device_map: auto
    torch_dtype: auto
    trust_remote_code: false
    use_chat_template: true
    add_generation_prompt: true
    reasoning_notes: Good open-weight baseline for prompt-format robustness and structured output tests.

  - model_id: gemma_2_2b_it
    family: gemma
    adapter: hf_local
    provider: huggingface_local
    enabled: false
    weights_path: google/gemma-2-2b-it
    device_map: auto
    torch_dtype: auto
    trust_remote_code: false
    use_chat_template: true
    add_generation_prompt: true
    reasoning_notes: Optional local baseline if Gemma access is already configured in the environment.

registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - enabled
    - weights_path
    - api_model_name
    - context_window
    - device_map
    - torch_dtype
    - trust_remote_code
    - use_chat_template
    - add_generation_prompt
    - reasoning_notes
