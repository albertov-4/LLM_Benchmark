protocol_id: iterative_repair
description: >
  Il modello genera un piano, riceve feedback dal validator in caso di errore
  e prova a correggersi entro un limite massimo di iterazioni.

prompting:
  use_system_prompt: true
  include_domain_prompt: true
  include_examples: true
  include_chain_of_thought: true
  include_external_feedback: true

generation:
  mode: repair_loop
  temperature: 0.1
  top_k: 10
  max_tokens: 8192

evaluation:
  max_iterations: 8
  require_final_plan_only: true

primary_questions:
  - Quanto migliora il modello dopo feedback esterno?
  - Dopo quante iterazioni trova un piano valido?
