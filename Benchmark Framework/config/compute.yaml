execution:
  default_seed: 42
  batch_size: 1
  num_workers: 1

generation_defaults:
  temperature: 0.0
  top_k: 10
  max_tokens: 4096

paths:
  local_cache_dir: .cache
  logs_dir: outputs/logs

notes:
  - Questo file puo essere specializzato per run locale, API o cluster HPC.
  - Non contiene la lista dei modelli; quella vive in models/model_registry.yaml.
