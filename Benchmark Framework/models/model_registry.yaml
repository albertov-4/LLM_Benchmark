models:
  - model_id: llama3_8b_instruct
    family: llama3
    adapter: hf_local
    provider: huggingface_local
    reasoning_notes: Strong baseline on instruction following, useful for direct plan and repair tests.

  - model_id: phi4
    family: phi
    adapter: hf_local
    provider: huggingface_local
    reasoning_notes: Candidate for stronger step-by-step reasoning and repair loops.

  - model_id: gemma3_27b_it
    family: gemma3
    adapter: hf_local
    provider: huggingface_local
    reasoning_notes: Useful for testing trade-off between large context reasoning and formatting stability.

  - model_id: kimi_dev_72b
    family: kimi
    adapter: hf_local
    provider: huggingface_local
    reasoning_notes: Candidate for stronger repair and longer-horizon planning.

registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - weights_path
    - api_model_name
    - context_window
    - reasoning_notes
