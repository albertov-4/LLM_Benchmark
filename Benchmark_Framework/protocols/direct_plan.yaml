protocol_id: direct_plan
description: >
  Il modello riceve dominio, problema e istruzioni di formato.
  Deve produrre direttamente il piano finale senza reasoning esplicito.

prompting:
  use_system_prompt: true
  include_domain_prompt: true
  include_examples: false
  include_chain_of_thought: false
  include_external_feedback: false

generation:
  mode: deterministic
  temperature: 0.0
  top_k: null
  max_tokens: 4096

evaluation:
  max_iterations: 1
  require_final_plan_only: true

primary_questions:
  - Il modello produce un piano valido al primo tentativo?
  - Il modello rispetta il formato senza repair?
