# llama.cpp / GGUF equivalents for the NVIDIA registry models.
#
# llama.cpp does not load Hugging Face repos directly in this benchmark.
# Download one GGUF file first, then replace each `model_path` placeholder with
# the exact local `.gguf` path. `executable_path` can be `llama-cli` if it is on
# PATH, or an absolute path to the llama.cpp binary.
#
# DeepSeek V4 Pro is omitted because no reliable GGUF equivalent was identified.

models:
  - model_id: llamacpp_gemma_4_31b_it
    family: gemma
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: s3dev-ai/gemma-4-31B-it-gguf
    temperature: 1
    top_p: 0.95
    max_tokens: 16384
    context_size: 32768
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of google/gemma-4-31b-it.

  - model_id: llamacpp_phi_4_mini_instruct
    family: phi
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: ysn-rfd/Phi-4-mini-instruct-GGUF
    temperature: 0.1
    top_p: 0.7
    max_tokens: 1024
    context_size: 8192
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of microsoft/phi-4-mini-instruct.

  - model_id: llamacpp_gpt_oss_120b
    family: gpt_oss
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: gaianet/gpt-oss-120b-GGUF
    temperature: 1
    top_p: 1
    max_tokens: 4096
    context_size: 32768
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of openai/gpt-oss-120b.

  - model_id: llamacpp_kimi_k2_6
    family: kimi
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: ubergarm/Kimi-K2.6-GGUF
    temperature: 1
    top_p: 0.9
    max_tokens: 16384
    context_size: 32768
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of moonshotai/kimi-k2.6; very large model.

  - model_id: llamacpp_llama_3_3_70b_instruct
    family: llama
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: SandLogicTechnologies/Llama-3.3-70B-Instruct-GGUF
    temperature: 0.2
    top_p: 0.7
    max_tokens: 1024
    context_size: 8192
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of meta/llama-3.3-70b-instruct.

  - model_id: llamacpp_nemotron_3_nano_30b_a3b
    family: nemotron
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: modelfix/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8-GGUF
    temperature: 1
    top_p: 1
    max_tokens: 16384
    context_size: 32768
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of nvidia/nemotron-3-nano-30b-a3b.

  - model_id: llamacpp_qwen_3_5_122b_a10b
    family: qwen
    adapter: llama_cpp_cli
    provider: llama_cpp
    enabled: false
    executable_path: llama-cli
    model_path: REPLACE_WITH_LOCAL_GGUF_FILE
    gguf_source: bartowski/Qwen_Qwen3.5-122B-A10B-GGUF
    temperature: 0.6
    top_p: 0.95
    max_tokens: 16384
    context_size: 32768
    threads: null
    timeout_seconds: 300
    reasoning_notes: GGUF equivalent of qwen/qwen3.5-122b-a10b.

registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - enabled
    - executable_path
    - model_path
    - gguf_source
    - temperature
    - top_p
    - max_tokens
    - context_size
    - threads
    - timeout_seconds
    - reasoning_notes
