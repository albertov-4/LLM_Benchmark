task_family: citycar
task_type: pddl_planning
description: >
  Planning urbano con auto, garage, junction e costruzione/distruzione di strade.
  La batteria serve a testare validita, reasoning multi-step e capacita di repair.

source:
  repo_root_relative:
    domain_file: References/LLM-Needs-a-Plan-main/LLM-Needs-a-Plan-main/src/data/citycar/city_car_domain.pddl
    instances_root: References/LLM-Needs-a-Plan-main/LLM-Needs-a-Plan-main/src/data/citycar

difficulty_tiers:
  easy:
    description: Piccole istanze, pochi oggetti, branching basso, piani corti.
    instances:
      - instance-01
      - instance-02
      - instance-03
      - instance-04
      - instance-05
      - instance-06
  medium:
    description: Maggior numero di oggetti e dipendenze locali fra vincoli.
    instances:
      - instance-07
      - instance-08
      - instance-09
      - instance-10
      - instance-11
      - instance-12
      - instance-13
  hard:
    description: Piani piu lunghi, dipendenze piu profonde e maggiore rischio di errori.
    instances:
      - instance-14
      - instance-15
      - instance-16
      - instance-17
      - instance-18
      - instance-19
      - instance-20

metrics:
  primary:
    - validity_at_1
    - validity_at_k
    - repair_success
  secondary:
    - plan_length
    - iterations_to_valid
    - error_type_distribution

notes:
  - La classificazione e iniziale e puo essere raffinata dopo le prime baseline.
  - Tutte le istanze devono essere valutate con lo stesso validator e lo stesso parser.
