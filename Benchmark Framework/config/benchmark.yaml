benchmark_name: llm_planning_benchmark
version: 0.1.0

default_task_index: tasks/metadata/task_index.csv
default_output_root: outputs

difficulty_levels:
  - easy
  - medium
  - hard

default_metrics:
  - validity_at_1
  - validity_at_k
  - repair_success
  - plan_length
  - iterations_to_valid
  - error_type

result_schema:
  raw_record: outputs/raw/<model_id>/<protocol_id>/<task_family>/<instance_id>.json
  parsed_record: outputs/parsed/<model_id>/<protocol_id>/<task_family>/<instance_id>.json
  scored_record: outputs/scored/<model_id>/<protocol_id>/<task_family>/<instance_id>.json
