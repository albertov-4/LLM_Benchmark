protocol_id: direct_plan_with_rationale
description: >
  Il modello puo ragionare, ma deve comunque restituire un piano finale estraibile.
  Il reasoning viene raccolto come informazione ausiliaria, non come metrica primaria.

prompting:
  use_system_prompt: true
  include_domain_prompt: true
  include_examples: true
  include_chain_of_thought: true
  include_external_feedback: false

generation:
  mode: semi_deterministic
  temperature: 0.1
  top_k: 10
  max_tokens: 6144

evaluation:
  max_iterations: 1
  require_final_plan_only: false

primary_questions:
  - Il reasoning migliora la validita del piano?
  - Il reasoning testuale resta coerente con il piano finale?
