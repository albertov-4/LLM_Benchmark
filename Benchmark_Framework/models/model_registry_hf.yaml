# Hugging Face equivalents for the NVIDIA registry models.
#
# `weights_path` is a Hugging Face repo id here. `prepare_models.py` can
# download these into a local cache, then you can replace `weights_path` with
# the prepared local directory for offline/HPC runs.
#
# All entries are disabled by default because several models are very large.

models:
  - model_id: hf_deepseek_v4_pro
    family: deepseek
    adapter: hf_local
    provider: huggingface_local
    enabled: false
    weights_path: deepseek-ai/DeepSeek-V4-Pro
    device_map: auto
    torch_dtype: auto
    trust_remote_code: true
    use_chat_template: true
    add_generation_prompt: true
    temperature: 0.1
    top_p: 0.95
    max_tokens: 4096
    thinking_key: enable_thinking
    thinking_enabled: false
    reasoning_notes: Hugging Face equivalent of deepseek-ai/deepseek-v4-pro.

  - model_id: hf_gemma_4_31b_it
    family: gemma
    adapter: hf_local
    provider: huggingface_local
    enabled: true
    weights_path: google/gemma-4-31B-it
    model_loader: image_text_to_text
    device_map: auto
    torch_dtype: bfloat16
    trust_remote_code: false
    use_chat_template: true
    add_generation_prompt: true
    temperature: 0.1
    top_p: 0.95
    max_tokens: 4096
    thinking_key: enable_thinking
