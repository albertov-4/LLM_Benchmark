models:
  - model_id: nvidia_deepseek_v4_pro
    family: deepseek
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: deepseek-ai/deepseek-v4-pro
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_DEEPSEEK_API_KEY
    stream: false
    temperature: 1
    top_p: 0.95
    max_tokens: 4096
    thinking_key: thinking
    thinking_enabled: false
    timeout_seconds: 300
    reasoning_notes: Remote NVIDIA API example; requires NVIDIA_DEEPSEEK_API_KEY in the environment.

  - model_id: nvidia_gemma_4_31b_it
    family: gemma
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: google/gemma-4-31b-it
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_GEMMA_API_KEY
    stream: false
    temperature: 1
    top_p: 0.95
    max_tokens: 4096
    thinking_key: enable_thinking
    thinking_enabled: false
    timeout_seconds: 300
    reasoning_notes: NVIDIA Gemma example with enable_thinking chat template option.

  - model_id: nvidia_phi_4_mini_instruct
    family: phi
    adapter: nvidia_api
    provider: nvidia_api
    enabled: true
    api_model_name: microsoft/phi-4-mini-instruct
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_PHI_API_KEY
    stream: true
    temperature: 0.0
    top_p: 0.9
    max_tokens: 1024
    thinking_enabled: false
    timeout_seconds: 300
    reasoning_notes: NVIDIA Phi-4 mini streaming example.

  - model_id: nvidia_gpt_oss_120b
    family: gpt_oss
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: openai/gpt-oss-120b
    api_mode: responses
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_GPT_OSS_API_KEY
    stream: false
    temperature: 1
    top_p: 1
    max_tokens: 4096
    timeout_seconds: 300
    reasoning_notes: NVIDIA Responses API example.

  - model_id: nvidia_kimi_k2_thinking
    family: kimi
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: moonshotai/kimi-k2-thinking
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_KIMI_API_KEY
    stream: true
    temperature: 1
    top_p: 0.9
    max_tokens: 16384
    timeout_seconds: 300
    reasoning_notes: NVIDIA Kimi streaming example; reasoning_content is stored separately.

  - model_id: nvidia_llama_3_3_70b_instruct
    family: llama
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: meta/llama-3.3-70b-instruct
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_LLAMA_API_KEY
    stream: true
    temperature: 0.2
    top_p: 0.7
    max_tokens: 4096
    timeout_seconds: 300
    reasoning_notes: NVIDIA Llama 3.3 70B streaming example.

  - model_id: nvidia_nemotron_3_nano_30b_a3b
    family: nemotron
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: nvidia/nemotron-3-nano-30b-a3b
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_NEMOTRON_API_KEY
    stream: true
    temperature: 1
    top_p: 1
    max_tokens: 16384
    reasoning_budget: 16384
    thinking_key: enable_thinking
    thinking_enabled: true
    timeout_seconds: 300
    reasoning_notes: NVIDIA Nemotron streaming example with reasoning_budget.
    

  - model_id: nvidia_qwen_3_5_122b_a10b
    family: qwen
    adapter: nvidia_api
    provider: nvidia_api
    enabled: false
    api_model_name: qwen/qwen3.5-122b-a10b
    api_mode: chat_completions
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_QWEN_API_KEY
    stream: true
    temperature: 0.6
    top_p: 0.95
    max_tokens: 2048
    thinking_key: enable_thinking
    thinking_enabled: true
    timeout_seconds: 300
    reasoning_notes: NVIDIA Qwen streaming example with enable_thinking chat template option.

registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - enabled
    - weights_path
    - ollama_model
    - api_model_name
    - api_key_env
    - api_mode
    - base_url
    - context_window
    - executable_path
    - model_path
    - device_map
    - torch_dtype
    - top_p
    - temperature
    - max_tokens
    - stream
    - thinking_key
    - thinking_enabled
    - reasoning_budget
    - threads
    - timeout_seconds
    - trust_remote_code
    - use_chat_template
    - add_generation_prompt
    - reasoning_notes
