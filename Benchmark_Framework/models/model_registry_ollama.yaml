# Ollama equivalents for the NVIDIA registry models.
#
# `ollama_model` is the name passed to the local Ollama server. Some entries
# may be cloud-only or hardware-prohibitive depending on your Ollama setup.
# Qwen/Qwen3.5-122B-A10B is intentionally omitted because no reliable Ollama
# equivalent was identified.

models:
  - model_id: ollama_deepseek_v4_pro
    family: deepseek
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: deepseek-v4-pro
    base_url: http://localhost:11434
    temperature: 1
    top_p: 0.95
    max_tokens: 16384
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of deepseek-ai/deepseek-v4-pro; may require Ollama cloud availability.

  - model_id: ollama_gemma_4_31b_it
    family: gemma
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: gemma4:31b
    base_url: http://localhost:11434
    temperature: 1
    top_p: 0.95
    max_tokens: 16384
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of google/gemma-4-31b-it.

  - model_id: ollama_phi_4_mini_instruct
    family: phi
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: phi4-mini
    base_url: http://localhost:11434
    temperature: 0.1
    top_p: 0.7
    max_tokens: 1024
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of microsoft/phi-4-mini-instruct.

  - model_id: ollama_gpt_oss_120b
    family: gpt_oss
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: gpt-oss:120b
    base_url: http://localhost:11434
    temperature: 1
    top_p: 1
    max_tokens: 4096
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of openai/gpt-oss-120b.

  - model_id: ollama_kimi_k2_thinking
    family: kimi
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: kimi-k2-thinking
    base_url: http://localhost:11434
    temperature: 1
    top_p: 0.9
    max_tokens: 16384
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of moonshotai/kimi-k2-thinking; may require Ollama cloud availability.

  - model_id: ollama_llama_3_3_70b_instruct
    family: llama
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: llama3.3:70b
    base_url: http://localhost:11434
    temperature: 0.2
    top_p: 0.7
    max_tokens: 1024
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of meta/llama-3.3-70b-instruct.

  - model_id: ollama_nemotron_3_nano_30b_a3b
    family: nemotron
    adapter: ollama
    provider: ollama_local
    enabled: false
    ollama_model: nemotron-3-nano:30b
    base_url: http://localhost:11434
    temperature: 1
    top_p: 1
    max_tokens: 16384
    timeout_seconds: 300
    reasoning_notes: Ollama equivalent of nvidia/nemotron-3-nano-30b-a3b.


registry_rules:
  required_fields:
    - model_id
    - family
    - adapter
    - provider
  optional_fields:
    - enabled
    - ollama_model
    - base_url
    - temperature
    - top_p
    - max_tokens
    - timeout_seconds
    - reasoning_notes
