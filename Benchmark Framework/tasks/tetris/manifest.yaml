task_family: tetris
task_type: pddl_planning
description: >
  Planning spaziale su griglia con pezzi singoli, lineari e a L.
  La batteria serve a testare reasoning strutturale, vincoli geometrici e repair.

source:
  repo_root_relative:
    domain_file: References/LLM-Needs-a-Plan-main/LLM-Needs-a-Plan-main/src/data/tetris/tetris_domain.pddl
    instances_root: References/LLM-Needs-a-Plan-main/LLM-Needs-a-Plan-main/src/data/tetris

difficulty_tiers:
  easy:
    description: Configurazioni piccole o con pochi spostamenti critici.
    instances:
      - instance-01
      - instance-02
      - instance-03
      - instance-04
      - instance-05
      - instance-06
  medium:
    description: Piu interazioni geometriche e piu passi richiesti.
    instances:
      - instance-07
      - instance-08
      - instance-09
      - instance-10
      - instance-11
      - instance-12
      - instance-13
  hard:
    description: Configurazioni con forte dipendenza spaziale e alto rischio di invalidita.
    instances:
      - instance-14
      - instance-15
      - instance-16
      - instance-17
      - instance-18
      - instance-19
      - instance-20

metrics:
  primary:
    - validity_at_1
    - validity_at_k
    - repair_success
  secondary:
    - plan_length
    - iterations_to_valid
    - error_type_distribution

notes:
  - La difficolta potra essere ricalibrata usando planner simbolici o baseline LLM.
  - Il parser deve controllare sia formato sia plausibilita delle azioni.
