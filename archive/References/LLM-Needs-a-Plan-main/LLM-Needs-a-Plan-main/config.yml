# Model and data paths configuration
MODEL_PATH: "src/models/Phi4"  # Llama4 or any other model directory
PROBLEMS_PATH: "src/data"        # Root directory containing domain folders (tetris, citycar, etc.)
MODEL_OUTPUT: "src/results"      # Alias for main.py compatibility

# Validation settings
VAL_PATH: "VAL/build/linux64/Release/bin"  # Path to VAL binaries directory
VAL_EXECUTABLE: "Validate"  # VAL executable name (note: capital V)
VAL_TIMEOUT: 300  # Seconds

# Model settings
MAX_TOKENS: 5000
TEMPERATURE: 0.6
TOP_K: 10

# Multi-GPU settings
DEVICE_MAP: "auto"        # Options: "auto", "balanced", "sequential", or specific mapping
MAX_GPU_MEMORY: null      # Per-GPU memory limit in GB (null for no limit)

# Execution settings
DEFAULT_ITERATIONS: 3  # For iterative validation
BATCH_SIZE: 1